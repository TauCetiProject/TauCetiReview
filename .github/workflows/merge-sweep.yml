name: merge-sweep

# Re-drive green PRs that the merge queue evicted, so an eviction is never terminal. auto-merge.yml
# enqueues a PR once per triggering event; if the queue then evicts it (a merge group that could not
# form, or a rebuild against a moved main that failed), nothing re-drives an otherwise-idle green PR and
# it strands — green on every rubric, never merged. This scheduled sweep re-enqueues such PRs (reusing
# the EXISTING head-pinned review — no re-review, no provider keys, no spend), and for a head the queue
# has repeatedly rejected, updates the branch onto main (re-test + re-review) or flags a conflict. The
# merge decision is the same decide_from_comments the merge-only path uses, so the sweep can never
# enqueue something the normal gate would refuse. Like merge-only, this runs no reviewer and mints only
# the App credentials the merge needs.

on:
  workflow_call:
    inputs:
      dry_run:
        description: "List actions without enqueuing / updating / flagging"
        type: boolean
        default: false
    secrets:
      APP_ID: { required: true }
      APP_PRIVATE_KEY: { required: true }

permissions:
  contents: read

concurrency:
  group: tauceti-merge-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout review repo (runner)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiReview
          ref: main
          persist-credentials: false

      # contents:write to enqueue (as a queue bypass actor) and update-branch; pull-requests:write to
      # label / comment when flagging. Scoped to TauCeti only, like merge-only.yml.
      - name: Mint merge token (TauCeti contents + pull-requests write)
        id: merge_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCeti
          permission-contents: write
          permission-pull-requests: write

      - name: Re-drive evicted green PRs
        env:
          GH_TOKEN: ${{ steps.merge_token.outputs.token }}
          REPO: FormalFrontier/TauCeti
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python3 runner/sweep.py
