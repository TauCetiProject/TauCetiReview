name: merge-only

# A cheap, no-dispatch auto-merge: read the EXISTING review ledger (reviews branch) and, if a PR is
# all-green and TauCeti/-only, add it to the merge queue. Generates NO reviews, stages NO provider
# keys, and runs NO reviewer — the reviews themselves are produced by people running tauceti-review
# locally; CI just reads what is already on the ledger and enqueues. This keeps auto-merge automatic
# with the expensive review API spend turned off (see runner/review.py --mode merge).
#
# Enqueue, not direct merge: the queue retests each entry against the CURRENT main and merges in
# order, so an approved PR that has fallen behind main is retested and merged without any re-review,
# rather than stranded (as it was when this merged directly and skipped BEHIND PRs).

on:
  workflow_call:
    inputs:
      pr: { required: true, type: string }
    secrets:
      # Only the App credentials the merge needs — the caller passes these explicitly rather than
      # inheriting all of TauCeti's secrets into this public-triggerable path.
      APP_ID: { required: true }
      APP_PRIVATE_KEY: { required: true }

permissions:
  contents: read

concurrency:
  group: tauceti-merge-${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      PR: ${{ inputs.pr }}
    steps:
      # No provider keys, no reviewer step — nothing here runs PR-influenced code, so the
      # security posture is simpler than review.yml: only trusted GitHub-derived inputs.
      - name: Checkout review repo (runner + rubrics)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiReview
          ref: main
          persist-credentials: false

      - name: Checkout roadmap (public)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiRoadmap
          path: roadmap
          persist-credentials: false

      - name: Resolve PR head and fetch diff
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          HEAD_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json headRefOid -q .headRefOid)
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
          BASE_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json baseRefOid -q .baseRefOid)
          echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          MERGE_BASE=$(gh api "/repos/FormalFrontier/TauCeti/compare/${BASE_SHA}...${HEAD_SHA}" \
            --jq '.merge_base_commit.sha' 2>/dev/null || echo "")
          echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
          echo "RUBRICS_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          # `build` and `bump-guard` are the authoritative commit STATUSES that pr-build / bump-guard
          # POST (state encodes scope + diff-size + audit), so read them by `.context`/`.state`, not
          # the job CheckRun (whose name differs — bump-guard's job is "guard"). Missing -> "" -> the
          # engine refuses to merge. Posted by the trusted base-repo CI; external authors cannot write
          # statuses to the base repo.
          CI_BUILD=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json statusCheckRollup \
            -q '[.statusCheckRollup[]? | select(.__typename=="StatusContext" and .context=="build") | .state] | first // ""')
          echo "CI_BUILD=$CI_BUILD" >> "$GITHUB_ENV"
          BUMP_GUARD=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json statusCheckRollup \
            -q '[.statusCheckRollup[]? | select(.__typename=="StatusContext" and .context=="bump-guard") | .state] | first // ""')
          echo "BUMP_GUARD=$BUMP_GUARD" >> "$GITHUB_ENV"
          gh pr diff "$PR" --repo FormalFrontier/TauCeti > diff.txt
          echo "diff lines: $(wc -l < diff.txt)"

      - name: Fetch this PR's round records from TauCetiData (sparse, complete, fail-closed)
        run: |
          set -euo pipefail
          # The merge gate's source of truth is the per-PR round records on TauCetiData
          # (records/rounds/<pr>/<round_id>.json, schema tauceti.round/v1), written by every reviewer.
          # Enumerate via a sparse git checkout, not the Contents API: git gives a COMPLETE view of the
          # directory (the Contents API caps directory listings, which an open store could exceed or be
          # flooded past, hiding a newer blocking record). Public repo -> no token. `set -e` fails the
          # job closed on any clone error; a PR with no records leaves rounds/ empty -> the decision
          # step refuses ("no live review at head").
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/FormalFrontier/TauCetiData tcdata
          git -C tcdata sparse-checkout set "records/rounds/$PR"
          mkdir -p rounds
          if [ -d "tcdata/records/rounds/$PR" ]; then
            find "tcdata/records/rounds/$PR" -maxdepth 1 -name '*.json' -exec cp {} rounds/ \;
          fi
          echo "fetched $(find rounds -name '*.json' | wc -l) round record(s) for #$PR"

      - name: Compute merge decision from TauCetiData round records (no dispatch, no spend)
        run: |
          set -euo pipefail
          # Mergeable iff the latest live/production/exact round record AT THE CURRENT HEAD has every
          # required rubric green (head-pinned, so no carried-over approval) and the shared decide_merge
          # rule holds (build green, TauCeti/-only + allowed root/pins, bump-guard for a pin change).
          # Records are untrusted public input, so merge_from_data.py validates every field.
          python3 runner/merge_from_data.py \
            --pr "$PR" --head-sha "$HEAD_SHA" --rounds-dir rounds \
            --diff-file diff.txt --ci-build "$CI_BUILD" --bump-guard "$BUMP_GUARD" \
            --merge-decision-file "$PWD/merge.json"

      # ---- Auto-merge: mint the scoped merge token only now, and merge iff the decision is green.
      # ---- The App must be a ruleset bypass actor and hold TauCeti contents:write for it to land.
      - name: Mint merge token (TauCeti contents + pull-requests write)
        id: merge_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCeti
          permission-contents: write
          permission-pull-requests: write

      - name: Enqueue into the merge queue if all rubrics approve and PR is TauCeti/-only
        env: { GH_TOKEN: "${{ steps.merge_token.outputs.token }}" }
        run: |
          set -euo pipefail
          if [ ! -f merge.json ] || [ "$(jq -r .merge merge.json)" != "true" ]; then
            echo "not enqueuing: $(jq -r '.reason // "no decision file"' merge.json 2>/dev/null || echo 'no decision file')"
            exit 0
          fi
          # Re-read state right before enqueuing: the decision was computed for HEAD_SHA, so only
          # enqueue if that is still the head (a later push re-triggers with a fresh decision).
          read -r CUR_HEAD PRID < <(gh pr view "$PR" --repo FormalFrontier/TauCeti \
            --json headRefOid,id -q '.headRefOid + " " + .id')
          if [ "$CUR_HEAD" != "$HEAD_SHA" ]; then
            echo "head moved ($HEAD_SHA -> $CUR_HEAD) since the decision; skipping (a fresh build will re-trigger)."
            exit 0
          fi
          # Hand the PR to the merge queue rather than merging directly. The queue retests it against
          # the CURRENT main (the merge_group build + bump-guard) and merges in order, so a PR that has
          # fallen BEHIND is retested and merged without any re-review, instead of being stranded as it
          # was when we merged here directly and skipped behind PRs. The App is a queue + review bypass
          # actor, so enqueuing as it clears the code-owner gate the AI-reviewed TauCeti/ math PRs skip.
          #
          # expectedHeadOid binds the enqueue to the exact reviewed commit (the old --match-head-commit
          # guarantee): if the author races a new push in between, the mutation is rejected rather than
          # queueing an un-reviewed commit. The CUR_HEAD check above is just a cheaper early-out.
          echo "enqueuing #$PR ($CUR_HEAD): $(jq -r .reason merge.json)"
          if out=$(gh api graphql -f query='
            mutation($prId: ID!, $headOid: GitObjectID!) {
              enqueuePullRequest(input: { pullRequestId: $prId, expectedHeadOid: $headOid }) {
                mergeQueueEntry { position state }
              }
            }' -f prId="$PRID" -f headOid="$HEAD_SHA" 2>&1); then
            echo "$out"; echo "enqueued #$PR."
          else
            echo "$out"
            # Benign, retried on the next build / scoreboard event: already in the queue, the head
            # moved (expectedHeadOid mismatch), or GitHub does not currently consider it mergeable.
            # Anything else (auth, permissions, queue disabled, malformed query) is a real fault: fail
            # loudly so a broken merge path is visible rather than silently never merging.
            if printf '%s' "$out" | grep -qiE 'already queued|already in the merge queue|expected head|head .*(moved|changed|match)|not mergeable|mergeable state'; then
              echo "enqueue not applied (already queued / head moved / not yet mergeable) — a later trigger retries."
            else
              echo "::error::unexpected enqueue failure for #$PR"; exit 1
            fi
          fi
