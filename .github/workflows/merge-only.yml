name: merge-only

# A cheap, no-dispatch auto-merge: read the EXISTING review ledger (reviews branch) and merge a
# green PR if it is all-green and TauCeti/-only. Generates NO reviews, stages NO provider keys, and
# runs NO reviewer — the reviews themselves are produced by people running tauceti-review locally;
# CI just reads what is already on the ledger and merges. This keeps auto-merge automatic with the
# expensive review API spend turned off (see runner/review.py --mode merge).

on:
  workflow_call:
    inputs:
      pr: { required: true, type: string }

permissions:
  contents: read

concurrency:
  group: tauceti-merge-${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      PR: ${{ inputs.pr }}
    steps:
      # No provider keys, no reviewer step — nothing here runs PR-influenced code, so the
      # security posture is simpler than review.yml: only trusted GitHub-derived inputs.
      - name: Checkout review repo (runner + rubrics)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiReview
          ref: main
          persist-credentials: false

      - name: Checkout roadmap (public)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiRoadmap
          path: roadmap
          persist-credentials: false

      - name: Resolve PR head and fetch diff
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          HEAD_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json headRefOid -q .headRefOid)
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
          BASE_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json baseRefOid -q .baseRefOid)
          echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          MERGE_BASE=$(gh api "/repos/FormalFrontier/TauCeti/compare/${BASE_SHA}...${HEAD_SHA}" \
            --jq '.merge_base_commit.sha' 2>/dev/null || echo "")
          echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
          echo "RUBRICS_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          # CI's build-check conclusion for this head (GitHub's own result, not author input).
          CI_BUILD=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json statusCheckRollup \
            -q '[.statusCheckRollup[]? | select(.name=="build") | .conclusion] | first // ""')
          echo "CI_BUILD=$CI_BUILD" >> "$GITHUB_ENV"
          # bump-guard's conclusion for this head: required green before a PR that changes a
          # Lake pin (lake-manifest.json / lean-toolchain) may auto-merge (see runner/review.py).
          BUMP_GUARD=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json statusCheckRollup \
            -q '[.statusCheckRollup[]? | select(.name=="bump-guard") | .conclusion] | first // ""')
          echo "BUMP_GUARD=$BUMP_GUARD" >> "$GITHUB_ENV"
          gh pr diff "$PR" --repo FormalFrontier/TauCeti > diff.txt
          echo "diff lines: $(wc -l < diff.txt)"

      - name: Prepare review store (reviews branch; public read, no token on disk)
        # Read side only: clone the reviews-branch ledger so --mode merge can read it. This
        # workflow never writes the ledger back (it dispatches nothing), so no store token is minted.
        run: |
          git clone --depth 1 --branch reviews --single-branch \
            https://github.com/FormalFrontier/TauCetiReview store 2>/dev/null \
            || { mkdir -p store && cd store && git init -q && git checkout -q --orphan reviews; }

      - name: Compute merge decision from the existing ledger (no dispatch, no spend)
        run: |
          python3 runner/review.py \
            --repo FormalFrontier/TauCeti --pr "$PR" --mode merge \
            --rubrics-dir rubrics --tool-cwd . \
            --diff-file diff.txt --store store \
            --head-sha "$HEAD_SHA" --base-sha "$BASE_SHA" --merge-base-sha "$MERGE_BASE" \
            --rubrics-sha "$RUBRICS_SHA" \
            --ci-build "$CI_BUILD" --bump-guard "$BUMP_GUARD" \
            --merge-decision-file "$PWD/merge.json"

      # ---- Auto-merge: mint the scoped merge token only now, and merge iff the decision is green.
      # ---- The App must be a ruleset bypass actor and hold TauCeti contents:write for it to land.
      - name: Mint merge token (TauCeti contents + pull-requests write)
        id: merge_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCeti
          permission-contents: write
          permission-pull-requests: write

      - name: Auto-merge if all rubrics approve and PR is TauCeti/-only
        env: { GH_TOKEN: "${{ steps.merge_token.outputs.token }}" }
        run: |
          if [ -f merge.json ] && [ "$(jq -r .merge merge.json)" = "true" ]; then
            echo "auto-merging: $(jq -r .reason merge.json)"
            gh pr merge "$PR" --repo FormalFrontier/TauCeti --squash
          else
            echo "not auto-merging: $(jq -r '.reason // "no decision file"' merge.json 2>/dev/null || echo 'no decision file')"
          fi
