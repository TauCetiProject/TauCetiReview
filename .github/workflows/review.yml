name: review

on:
  workflow_call:
    inputs:
      pr: { required: true, type: string }
      trigger: { required: false, type: string, default: "manual" }
      review_ref: { required: false, type: string, default: main }
      enable_automerge: { required: false, type: boolean, default: false }
      # Reply flow (Stage 2): re-run a single rubric in response to an author reply.
      mode: { required: false, type: string, default: "" }
      reply_rubric: { required: false, type: string, default: "" }
      reply_comment_id: { required: false, type: string, default: "" }
  workflow_dispatch:
    inputs:
      pr: { required: true, type: string }
      review_ref: { required: false, type: string, default: main }
      enable_automerge: { required: false, type: boolean, default: false }

permissions:
  contents: read

concurrency:
  group: tauceti-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      PR: ${{ inputs.pr }}
    steps:
      # ---- Untrusted-input phase: NO tokens, NO provider keys reachable by PR code ----
      - name: Checkout review repo (runner + rubrics)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiReview
          # main in production (workflow_call); a dispatch can point at a branch to test changes.
          ref: ${{ inputs.review_ref || 'main' }}
          persist-credentials: false

      - name: Checkout roadmap (public)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCetiRoadmap
          path: roadmap
          persist-credentials: false

      - name: Resolve PR head and fetch diff
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          HEAD_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json headRefOid -q .headRefOid)
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"
          # Provenance for the review comments and meta block: the PR base tip, the merge base
          # (the actual left side of the three-dot diff below), and the rubrics+engine commit.
          BASE_SHA=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json baseRefOid -q .baseRefOid)
          echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          MERGE_BASE=$(gh api "/repos/FormalFrontier/TauCeti/compare/${BASE_SHA}...${HEAD_SHA}" \
            --jq '.merge_base_commit.sha' 2>/dev/null || echo "")
          echo "MERGE_BASE=$MERGE_BASE" >> "$GITHUB_ENV"
          echo "RUBRICS_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          # CI's build-check conclusion for this head (GitHub's own result, not author input): the
          # engine uses it to tell reviewers the code compiles so they don't re-litigate the build.
          CI_BUILD=$(gh pr view "$PR" --repo FormalFrontier/TauCeti --json statusCheckRollup \
            -q '[.statusCheckRollup[]? | select(.name=="build") | .conclusion] | first // ""')
          echo "CI_BUILD=$CI_BUILD" >> "$GITHUB_ENV"
          gh pr diff "$PR" --repo FormalFrontier/TauCeti > diff.txt
          echo "diff lines: $(wc -l < diff.txt)"
          # The PR title+body: the author's stated intent, sources, and dependencies. The
          # rubric tells agents to read it; pass it through (as untrusted author input, like
          # the diff). Author-controlled, so no more trusted than the diff already is.
          gh pr view "$PR" --repo FormalFrontier/TauCeti --json title,body \
            --jq '"# " + .title + "\n\n" + (.body // "")' > pr_desc.txt
          echo "pr_desc bytes: $(wc -c < pr_desc.txt)"
          # Reply flow: fetch the author's reply body (untrusted) so the re-run can address it.
          : > reply.txt
          if [ -n "${{ inputs.reply_comment_id }}" ]; then
            gh api "/repos/FormalFrontier/TauCeti/pulls/comments/${{ inputs.reply_comment_id }}" \
              --jq '.body' > reply.txt || true
            echo "reply bytes: $(wc -c < reply.txt)"
          fi

      - name: Prepare review store (reviews branch; public read, no token on disk)
        run: |
          git clone --depth 1 --branch reviews --single-branch \
            https://github.com/FormalFrontier/TauCetiReview store 2>/dev/null \
            || { mkdir -p store && cd store && git init -q && git checkout -q --orphan reviews; }

      # ---- Responsiveness: post an in-progress scoreboard NOW — before the slow Mathlib clone,
      # ---- CLI install, and the model calls — so the bot's sticky comment appears as soon as it
      # ---- wakes. A comment token lives in these two steps only; the reviewer phase below stays
      # ---- tokenless. Best-effort: a failure here must not abort the review.
      - name: Mint comment token (early, for the in-progress scoreboard)
        id: early_comment_token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCeti
          permission-pull-requests: write

      - name: Post in-progress scoreboard
        continue-on-error: true
        env: { GH_TOKEN: "${{ steps.early_comment_token.outputs.token }}" }
        run: |
          python3 runner/review.py --repo FormalFrontier/TauCeti --pr "$PR" --mode init \
            --rubrics-dir rubrics --tool-cwd . --diff-file diff.txt --store store \
            --head-sha "$HEAD_SHA" --base-sha "$BASE_SHA" --merge-base-sha "$MERGE_BASE" \
            --rubrics-sha "$RUBRICS_SHA" \
            --scoreboard-file "$PWD/scoreboard.md" --post-plan-file "$PWD/post_plan.json"
          python3 runner/post.py --repo FormalFrontier/TauCeti --pr "$PR" \
            --plan "$PWD/post_plan.json" --store store

      - name: Checkout code at PR head (public, no credentials persisted)
        uses: actions/checkout@v4
        with:
          repository: FormalFrontier/TauCeti
          ref: ${{ env.HEAD_SHA }}
          path: code
          persist-credentials: false

      - name: Trusted Mathlib source for reviewer grep
        # Rev comes from the BASE repo's manifest, never the PR's. We never evaluate the PR's
        # lakefile/manifest (that would be arbitrary code execution on attacker input — I1).
        run: |
          base=$(mktemp -d)
          git clone --depth 1 https://github.com/FormalFrontier/TauCeti "$base/base"
          MREV=$(jq -r '.packages[] | select(.name=="mathlib") | .rev' "$base/base/lake-manifest.json")
          echo "mathlib rev (from base manifest): $MREV"
          git init -q mathlib
          git -C mathlib remote add origin https://github.com/leanprover-community/mathlib4
          git -C mathlib fetch -q --depth 1 origin "$MREV"
          git -C mathlib checkout -q FETCH_HEAD

      - name: Setup Node and CLIs
        uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Install Claude and Codex CLIs
        run: npm install -g @anthropic-ai/claude-code @openai/codex

      - name: Assemble clean reviewer workspace
        # Reviewers run here: only PR source (no .git), roadmap, Mathlib source, and the diff.
        # No store/, no runner/, no .git configs, no credentials anywhere in this tree.
        run: |
          REVROOT=$(mktemp -d)
          rsync -a --exclude='.git' code/ "$REVROOT/code/"
          rsync -a --exclude='.git' roadmap/ "$REVROOT/roadmap/"
          mv mathlib "$REVROOT/mathlib"
          cp diff.txt "$REVROOT/diff.txt"
          cp pr_desc.txt "$REVROOT/pr_desc.txt"
          echo "REVROOT=$REVROOT" >> "$GITHUB_ENV"

      - name: Stage provider keys to files (separate step; keys never enter the run-review env)
        env:
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
          OPENAI_API_KEY: "${{ secrets.OPENAI_API_KEY }}"
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          printf '%s' "$ANTHROPIC_API_KEY" > "$RUNNER_TEMP/keys/anthropic"
          printf '%s' "$OPENAI_API_KEY"   > "$RUNNER_TEMP/keys/openai"
          chmod 700 "$RUNNER_TEMP/keys"; chmod 600 "$RUNNER_TEMP/keys/"*

      - name: Run review
        # This step has NO secrets in its env. The runner reads the key files, unlinks them, and
        # hands each reviewer only its own key via an explicit minimal env (see runner reviewer_env).
        env:
          ENABLE_AUTOMERGE: ${{ inputs.enable_automerge }}
        run: |
          AM=""
          [ "$ENABLE_AUTOMERGE" = "true" ] && AM="--auto-merge"
          # An explicit mode (reply flow) wins; otherwise a /review comment forces a full
          # re-review and CI success on a new commit re-runs only blocking, then sweeps stale.
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            MODE=commit
            [ "${{ inputs.trigger }}" = "issue_comment" ] && MODE=manual
          fi
          REPLY_ARGS=""
          if [ "$MODE" = "reply" ]; then
            REPLY_ARGS="--reply-rubric ${{ inputs.reply_rubric }} --reply-file $PWD/reply.txt"
          fi
          python3 runner/review.py \
            --repo FormalFrontier/TauCeti --pr "$PR" --mode "$MODE" $REPLY_ARGS \
            --rubrics-dir rubrics --tool-cwd "$REVROOT" \
            --code-path code --roadmap-path roadmap --mathlib-path mathlib \
            --diff-file diff.txt --pr-desc-file pr_desc.txt --store store --daily-budget 50 \
            --head-sha "$HEAD_SHA" --base-sha "$BASE_SHA" --merge-base-sha "$MERGE_BASE" \
            --rubrics-sha "$RUBRICS_SHA" --archive-dir store/outbox \
            --ci-build "$CI_BUILD" $AM --merge-decision-file "$PWD/merge.json" \
            --keys-dir "$RUNNER_TEMP/keys" \
            --scoreboard-file "$PWD/scoreboard.md" --threads-dir "$PWD/threads" \
            --post-plan-file "$PWD/post_plan.json"

      # ---- Trusted phase: reviewers are done; mint scoped tokens only now ----
      - name: Mint comment token (TauCeti pull-requests:write)
        id: comment_token
        if: always()
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCeti
          permission-pull-requests: write

      - name: Post review (scoreboard + threads)
        # Executes the runner's post plan: upsert the in-place scoreboard and the per-rubric
        # review threads, then write the comment ids back into the store ledger (committed below).
        if: always()
        env: { GH_TOKEN: "${{ steps.comment_token.outputs.token }}" }
        run: |
          if [ -s post_plan.json ]; then
            python3 runner/post.py --repo FormalFrontier/TauCeti --pr "$PR" \
              --plan "$PWD/post_plan.json" --store store --archive-dir store/outbox
          else
            echo "no post plan (runner did not run, e.g. round cap); nothing to post"
          fi

      # ---- Archive sync: drain store/outbox into TauCetiData. Best-effort (the App may not
      # ---- cover TauCetiData yet); on failure the outbox rides along in the reviews-branch
      # ---- store commit below and syncs on a later run.
      - name: Mint archive token (TauCetiData contents:write)
        id: archive_token
        if: always()
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCetiData
          permission-contents: write

      - name: Sync archive to TauCetiData
        if: always()
        continue-on-error: true
        env: { TOKEN: "${{ steps.archive_token.outputs.token }}" }
        run: |
          if [ -d store/outbox ] && [ -n "$TOKEN" ]; then
            python3 runner/archive.py sync --store store --data-dir "$RUNNER_TEMP/tauceti-data" \
              --remote "https://x-access-token:${TOKEN}@github.com/FormalFrontier/TauCetiData"
          else
            echo "no outbox or no token; skipping archive sync"
          fi

      - name: Mint store token (TauCetiReview contents:write)
        id: store_token
        if: always()
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCetiReview
          permission-contents: write

      - name: Persist review store
        if: always()
        env: { TOKEN: "${{ steps.store_token.outputs.token }}" }
        run: |
          cd store
          git add -A
          git -c user.name="tauceti-review-bot[bot]" \
              -c user.email="tauceti-review-bot[bot]@users.noreply.github.com" \
              commit -q -m "review: PR #${PR}" || { echo "nothing to commit"; exit 0; }
          git push "https://x-access-token:${TOKEN}@github.com/FormalFrontier/TauCetiReview" HEAD:reviews

      # ---- Auto-merge (I9): dormant unless enable_automerge. The App must be a ruleset bypass
      # ---- actor and hold TauCeti contents:write for the merge to land.
      - name: Mint merge token (TauCeti contents + pull-requests write)
        id: merge_token
        if: ${{ inputs.enable_automerge }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: FormalFrontier
          repositories: TauCeti
          permission-contents: write
          permission-pull-requests: write

      - name: Auto-merge if all rubrics approve and PR is TauCeti/-only
        if: ${{ inputs.enable_automerge }}
        env: { GH_TOKEN: "${{ steps.merge_token.outputs.token }}" }
        run: |
          if [ -f merge.json ] && [ "$(jq -r .merge merge.json)" = "true" ]; then
            echo "auto-merging: $(jq -r .reason merge.json)"
            gh pr merge "$PR" --repo FormalFrontier/TauCeti --squash
          else
            echo "not auto-merging: $(jq -r '.reason // "no decision file"' merge.json 2>/dev/null || echo 'no decision file')"
          fi
